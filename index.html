<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - Dashboard IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #050505;
            --sidebar-bg: #0a0a0a;
            --nova-purple: #8b5cf6;
            --border: #1f1f1f;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-black); color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px;
        }

        .logo { font-weight: 800; font-size: 1.4rem; margin-bottom: 40px; color: var(--nova-purple); }

        .nav-item {
            padding: 12px 15px; border-radius: 8px; margin-bottom: 5px;
            cursor: pointer; color: var(--text-dim); transition: 0.3s;
            font-size: 0.9rem; display: flex; align-items: center;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(139, 92, 246, 0.1); color: var(--nova-purple);
        }

        /* --- CHAT AREA --- */
        .main-chat {
            flex: 1; display: flex; flex-direction: column;
            background: radial-gradient(circle at top right, #10081a, #050505);
        }

        .chat-header {
            padding: 20px 40px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        #chat-window {
            flex: 1; padding: 40px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .message { max-width: 80%; padding: 15px; border-radius: 12px; line-height: 1.5; }
        .ai-msg { background: var(--sidebar-bg); border: 1px solid var(--border); align-self: flex-start; }
        .user-msg { background: var(--nova-purple); color: white; align-self: flex-end; }

        /* --- INPUT AREA --- */
        .input-container {
            padding: 30px 40px; background: linear-gradient(transparent, var(--bg-black));
        }

        .input-box {
            background: #111; border: 1px solid var(--border);
            padding: 15px 25px; border-radius: 100px;
            display: flex; align-items: center; gap: 15px;
        }

        input {
            flex: 1; background: transparent; border: none;
            color: white; outline: none; font-size: 1rem;
        }

        .send-btn {
            background: var(--nova-purple); border: none; color: white;
            padding: 8px 18px; border-radius: 50px; cursor: pointer; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">NOVA AI</div>
        <div class="nav-item active" onclick="switchIA('E-commerce')">🛒 IA Ecommerce</div>
        <div class="nav-item" onclick="switchIA('Trading')">📈 IA Trading</div>
        <div class="nav-item" onclick="switchIA('TikTok')">📱 IA TikTok</div>
        <div class="nav-item" onclick="switchIA('Marketing')">🎯 IA Marketing</div>
        <div class="nav-item" onclick="switchIA('YouTube')">🎥 IA YouTube</div>
        <div class="nav-item" onclick="switchIA('Instagram')">📸 IA Instagram</div>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #222;">
            <div class="nav-item">⚙️ Paramètres</div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <h2 id="current-ia-title">Nova E-commerce</h2>
            <span style="color: var(--text-dim); font-size: 0.8rem;">Statut : Connecté</span>
        </div>

        <div id="chat-window">
            <div class="message ai-msg">
                Bonjour ! Je suis **Nova**, ton assistante spécialisée en <span id="ia-type-text">E-commerce</span>. Comment puis-je t'aider à exploser tes résultats aujourd'hui ?
            </div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Pose ta question à Nova...">
                <button class="send-btn" onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        function switchIA(type) {
            // Changer le titre
            document.getElementById('current-ia-title').innerText = 'Nova ' + type;
            document.getElementById('ia-type-text').innerText = type;
            
            // Gérer l'état actif dans la sidebar
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Nettoyer le chat pour la nouvelle IA
            document.getElementById('chat-window').innerHTML = `
                <div class="message ai-msg">
                    Mode <strong>Nova ${type}</strong> activé. Je suis prête. Que veux-tu savoir ?
                </div>`;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const window = document.getElementById('chat-window');
            
            if (input.value.trim() !== "") {
                // Message utilisateur
                window.innerHTML += `<div class="message user-msg">${input.value}</div>`;
                
                // Simulation réponse IA
                setTimeout(() => {
                    window.innerHTML += `<div class="message ai-msg">Analyse en cours... (Connexion API Nova nécessaire pour une réponse réelle)</div>`;
                    window.scrollTop = window.scrollHeight;
                }, 1000);

                input.value = "";
                window.scrollTop = window.scrollHeight;
            }
        }
    </script>

</body>
</html>
