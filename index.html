<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - Dashboard IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #050505;
            --sidebar-bg: #0a0a0a;
            --nova-purple: #8b5cf6;
            --border: #1f1f1f;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-black); color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px;
        }

        .logo { font-weight: 800; font-size: 1.4rem; margin-bottom: 40px; color: var(--nova-purple); }

        .nav-item {
            padding: 12px 15px; border-radius: 8px; margin-bottom: 5px;
            cursor: pointer; color: var(--text-dim); transition: 0.3s;
            font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(139, 92, 246, 0.1); color: var(--nova-purple);
        }

        .shopify-icon { width: 18px; height: 18px; fill: currentColor; }

        /* --- CHAT AREA --- */
        .main-chat {
            flex: 1; display: flex; flex-direction: column;
            background: radial-gradient(circle at top right, #10081a, #050505);
        }

        .chat-header {
            padding: 20px 40px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        #chat-window {
            flex: 1; padding: 40px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .message { max-width: 80%; padding: 15px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
        .ai-msg { background: var(--sidebar-bg); border: 1px solid var(--border); align-self: flex-start; }
        .user-msg { background: var(--nova-purple); color: white; align-self: flex-end; }

        /* --- BOUTONS ACTIONS --- */
        .action-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .action-btn {
            background: rgba(139, 92, 246, 0.1); border: 1px solid var(--nova-purple);
            color: white; padding: 8px 14px; border-radius: 8px; cursor: pointer;
            font-size: 0.8rem; transition: 0.3s;
        }
        .action-btn:hover { background: var(--nova-purple); color: black; }
        .btn-locked { opacity: 0.5; cursor: not-allowed; border-color: #444; }

        /* --- INPUT AREA --- */
        .input-container {
            padding: 30px 40px; background: linear-gradient(transparent, var(--bg-black));
        }

        .input-box {
            background: #111; border: 1px solid var(--border);
            padding: 12px 25px; border-radius: 100px;
            display: flex; align-items: center; gap: 15px;
        }

        input {
            flex: 1; background: transparent; border: none;
            color: white; outline: none; font-size: 1rem;
        }

        .send-btn {
            background: var(--nova-purple); border: none; color: white;
            padding: 8px 18px; border-radius: 50px; cursor: pointer; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">NOVA AI</div>
        
        <div class="nav-item active" onclick="switchIA('E-commerce')">
            <svg class="shopify-icon" viewBox="0 0 24 24"><path d="M4.22 5.34l1.32-.23c.31-.05.53-.33.51-.64l-.19-2.61C5.83.84 6.64 0 7.66 0h8.67c1.03 0 1.83.84 1.8 1.86l-.19 2.61c-.02.31.2.59.51.64l1.32.23c1.47.25 2.5 1.63 2.29 3.12l-1.39 9.9c-.21 1.5-1.54 2.64-3.05 2.64H6.38c-1.51 0-2.84-1.14-3.05-2.64l-1.39-9.9c-.21-1.49.82-2.87 2.28-3.12zM12 16a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>
            IA Ecommerce
        </div>

        <div class="nav-item" onclick="switchIA('Trading')">📈 IA Trading</div>
        <div class="nav-item" onclick="switchIA('TikTok')">📱 IA TikTok</div>
        <div class="nav-item" onclick="switchIA('Marketing')">🎯 IA Marketing</div>
        <div class="nav-item" onclick="switchIA('YouTube')">🎥 IA YouTube</div>
        <div class="nav-item" onclick="switchIA('Instagram')">📸 IA Instagram</div>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #222;">
            <div class="nav-item">⚙️ Paramètres</div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <h2 id="current-ia-title">Nova E-commerce</h2>
            <span style="color: var(--text-dim); font-size: 0.8rem;">Statut : Connecté</span>
        </div>

        <div id="chat-window">
            <div class="message ai-msg">
                Bonjour ! Je suis **Nova**, ton assistante spécialisée en <span id="ia-type-text">E-commerce</span>. Je peux t'aider à trouver un produit gagnant ou structurer ta boutique dropshipping.
                
                <div class="action-group" id="ecom-actions">
                    <button class="action-btn" onclick="sendMessage('Trouve-moi un produit gagnant 💎')">💎 Trouver un Winner</button>
                    <button class="action-btn" onclick="sendMessage('Aide-moi à créer ma boutique 🏗️')">🏗️ Créer ma Boutique</button>
                    <button class="action-btn btn-locked">📦 Sourceur (Bientôt)</button>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Pose ta question à Nova...">
                <button class="send-btn" onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        function switchIA(type) {
            document.getElementById('current-ia-title').innerText = 'Nova ' + type;
            document.getElementById('ia-type-text').innerText = type;
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            let welcomeMsg = `Mode <strong>Nova ${type}</strong> activé. Que puis-je faire pour vous ?`;
            let actions = '';

            if(type === 'E-commerce') {
                actions = `
                <div class="action-group">
                    <button class="action-btn" onclick="sendMessage('Trouve-moi un produit gagnant 💎')">💎 Trouver un Winner</button>
                    <button class="action-btn" onclick="sendMessage('Aide-moi à créer ma boutique 🏗️')">🏗️ Créer ma Boutique</button>
                    <button class="action-btn btn-locked">📦 Sourceur (Bientôt)</button>
                </div>`;
            }

            document.getElementById('chat-window').innerHTML = `
                <div class="message ai-msg">
                    ${welcomeMsg}
                    ${actions}
                </div>`;
        }

        function sendMessage(customMsg) {
            const input = document.getElementById('user-input');
            const window = document.getElementById('chat-window');
            const text = customMsg || input.value;
            
            if (text.trim() !== "") {
                window.innerHTML += `<div class="message user-msg">${text}</div>`;
                
                setTimeout(() => {
                    let aiResponse = "Analyse en cours via les serveurs Nova...";
                    if(text.includes('Winner')) aiResponse = "J'ai scanné TikTok Ads. Le produit 'Projecteur Galaxie 2.0' est en pleine explosion. Voulez-vous une description produit ?";
                    if(text.includes('Boutique')) aiResponse = "Je prépare une structure Shopify optimisée. Donnez-moi juste le nom de votre niche.";
                    
                    window.innerHTML += `<div class="message ai-msg">${aiResponse}</div>`;
                    window.scrollTop = window.scrollHeight;
                }, 1000);

                input.value = "";
                window.scrollTop = window.scrollHeight;
            }
        }
    </script>
</body>
</html>
